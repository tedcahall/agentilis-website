  <text x="392" y="301" font-size="10" fill="#1F1F1F" text-anchor="middle">Only Execute</text>
  <text x="392" y="316" font-size="10" fill="#1F1F1F" text-anchor="middle">Tools</text>
  <rect x="468" y="282" width="116" height="44" rx="7" fill="#F8F5F0" stroke="#4A3030" stroke-width="1.5"/>
  <text x="526" y="308" font-size="12" fill="#1F1F1F" font-weight="700" text-anchor="middle">LLMs</text>
  <line x1="459" y1="326" x2="459" y2="346" stroke="#D46B5E" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="375" y="350" width="168" height="38" rx="7" fill="#F8F5F0" stroke="#4A3030" stroke-width="1.5"/>
  <text x="459" y="374" font-size="11" fill="#1F1F1F" text-anchor="middle">Use Tools</text>
  <line x1="459" y1="388" x2="459" y2="408" stroke="#D46B5E" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="375" y="412" width="168" height="38" rx="7" fill="#F8F5F0" stroke="#4A3030" stroke-width="1.5"/>
  <text x="459" y="436" font-size="11" fill="#1F1F1F" text-anchor="middle">Output</text>

