<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200" font-family="'Inter','Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7A9E8E"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D46B5E"/>
    </marker>
    <marker id="arr-cod" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7EC8A0"/>
    </marker>
    <marker id="arr-ret" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#70B0D0"/>
    </marker>
    <marker id="arr-cit" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#B090D8"/>
    </marker>
    <marker id="arr-back" markerWidth="6" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <polygon points="6 0, 0 2.5, 6 5" fill="#7A9E8E" opacity="0.5"/>
    </marker>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="900" height="1200" fill="#2C3E4A"/>

  <!-- ═══ TITLE ═══ -->
  <text x="28" y="44" font-size="16" fill="#7A9E8E" font-weight="400">What is</text>
  <text x="28" y="78" font-size="30" fill="#FAFAF7" font-weight="700">Agentic AI?</text>

  <!-- ═══════════════════════════════════════
       TOP PANEL — NOT Agentic AI
       ═══════════════════════════════════════ -->
  <rect x="18" y="96" width="864" height="440" rx="12" fill="#3A1818" stroke="#D46B5E" stroke-width="2.5"/>
  <text x="450" y="126" font-size="17" fill="#D46B5E" font-weight="700" text-anchor="middle">These are  NOT  Agentic AI</text>

  <!-- Separator lines between columns -->
  <line x1="318" y1="140" x2="318" y2="526" stroke="#6B3030" stroke-width="1"/>
  <line x1="600" y1="140" x2="600" y2="526" stroke="#6B3030" stroke-width="1"/>

  <!-- ── LLM Chatbots column ── -->
  <text x="168" y="158" font-size="13" fill="#E07868" font-weight="700" text-anchor="middle">LLM Chatbots</text>
  <!-- Person + Query -->
  <text x="168" y="190" font-size="11" fill="#C8B8B0" text-anchor="middle">👤 Query</text>
  <line x1="168" y1="196" x2="168" y2="216" stroke="#D46B5E" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <!-- System Prompt -->
