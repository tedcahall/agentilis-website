  <line x1="318" y1="596" x2="318" y2="1168" stroke="#2A4838" stroke-width="1"/>
  <line x1="570" y1="596" x2="570" y2="1168" stroke="#2A4838" stroke-width="1"/>

  <!-- Query + Output labels -->
  <text x="28" y="810" font-size="11" fill="#FAFAF7">👤 Query</text>
  <line x1="90" y1="808" x2="116" y2="808" stroke="#7A9E8E" stroke-width="2" marker-end="url(#arr)"/>
  <text x="28" y="1020" font-size="11" fill="#FAFAF7">Output</text>
  <line x1="116" y1="1018" x2="90" y2="1018" stroke="#7A9E8E" stroke-width="2" marker-end="url(#arr-back)"/>

