  <line x1="459" y1="196" x2="459" y2="216" stroke="#D46B5E" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="375" y="220" width="168" height="38" rx="7" fill="#F8F5F0" stroke="#4A3030" stroke-width="1.5"/>
