  <line x1="740" y1="196" x2="740" y2="216" stroke="#D46B5E" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="652" y="220" width="176" height="38" rx="7" fill="#F8F5F0" stroke="#4A3030" stroke-width="1.5"/>
  <text x="740" y="244" font-size="11" fill="#1F1F1F" text-anchor="middle">Embedding</text>
  <line x1="740" y1="258" x2="740" y2="278" stroke="#D46B5E" stroke-width="1.5" marker-end="url(#arr-red)"/>
