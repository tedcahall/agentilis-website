  <text x="168" y="245" font-size="11" fill="#1F1F1F" text-anchor="middle">System Prompt</text>
  <line x1="168" y1="260" x2="168" y2="280" stroke="#D46B5E" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <!-- LLMs -->
  <rect x="100" y="284" width="136" height="40" rx="7" fill="#F8F5F0" stroke="#4A3030" stroke-width="1.5"/>
  <text x="168" y="302" font-size="13" fill="#1F1F1F" font-weight="700" text-anchor="middle">LLMs</text>
  <line x1="168" y1="324" x2="168" y2="344" stroke="#D46B5E" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <!-- Output -->
  <rect x="100" y="348" width="136" height="38" rx="7" fill="#F8F5F0" stroke="#4A3030" stroke-width="1.5"/>
  <text x="168" y="372" font-size="11" fill="#1F1F1F" text-anchor="middle">Output</text>

