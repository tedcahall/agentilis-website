  <rect x="616" y="282" width="85" height="48" rx="6" fill="#F8F5F0" stroke="#4A3030" stroke-width="1.2"/>
  <text x="658" y="303" font-size="9" fill="#1F1F1F" text-anchor="middle">Knowledge</text>
  <text x="658" y="316" font-size="9" fill="#1F1F1F" text-anchor="middle">base</text>
  <rect x="707" y="282" width="66" height="48" rx="6" fill="#F8F5F0" stroke="#4A3030" stroke-width="1.2"/>
  <text x="740" y="303" font-size="9" fill="#1F1F1F" text-anchor="middle">Vector</text>
  <text x="740" y="316" font-size="9" fill="#1F1F1F" text-anchor="middle">Db</text>
  <rect x="779" y="282" width="84" height="48" rx="6" fill="#F8F5F0" stroke="#4A3030" stroke-width="1.2"/>
  <text x="821" y="300" font-size="9" fill="#1F1F1F" text-anchor="middle">Web Search</text>
  <text x="821" y="313" font-size="9" fill="#1F1F1F" text-anchor="middle">Data</text>
  <line x1="740" y1="330" x2="740" y2="350" stroke="#D46B5E" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="636" y="354" width="208" height="36" rx="7" fill="#F8F5F0" stroke="#4A3030" stroke-width="1.5"/>
  <text x="740" y="377" font-size="10" fill="#1F1F1F" text-anchor="middle">Data Augmentation</text>
  <line x1="740" y1="390" x2="740" y2="410" stroke="#D46B5E" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="660" y="414" width="160" height="38" rx="7" fill="#F8F5F0" stroke="#4A3030" stroke-width="1.5"/>
  <text x="740" y="436" font-size="12" fill="#1F1F1F" font-weight="700" text-anchor="middle">LLMs</text>
  <line x1="740" y1="452" x2="740" y2="472" stroke="#D46B5E" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="660" y="476" width="160" height="36" rx="7" fill="#F8F5F0" stroke="#4A3030" stroke-width="1.5"/>
  <text x="740" y="499" font-size="11" fill="#1F1F1F" text-anchor="middle">Output</text>

