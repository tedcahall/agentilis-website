  <rect x="168" y="614" width="112" height="38" rx="7" fill="#F8F5F0" stroke="#C8902A" stroke-width="1.5"/>
  <text x="224" y="638" font-size="11" fill="#7A5010" text-anchor="middle">Tools</text>

  <!-- Orchestrator box -->
  <rect x="44" y="664" width="252" height="108" rx="9" fill="#F8F5F0" stroke="#2C3E4A" stroke-width="2"/>
  <text x="170" y="686" font-size="12" fill="#2C3E4A" font-weight="700" text-anchor="middle">Orchestrator</text>
  <rect x="70" y="693" width="200" height="68" rx="7" fill="#2C3E4A" stroke="#7A9E8E" stroke-width="2"/>
  <text x="170" y="734" font-size="16" fill="#7A9E8E" font-weight="700" text-anchor="middle">LLM</text>

  <!-- Planning + Feedback -->
  <rect x="44" y="782" width="112" height="38" rx="7" fill="#F8F5F0" stroke="#7A9E8E" stroke-width="1.5"/>
  <text x="100" y="806" font-size="11" fill="#1F1F1F" text-anchor="middle">Planning</text>
  <rect x="168" y="782" width="112" height="38" rx="7" fill="#F8F5F0" stroke="#7A9E8E" stroke-width="1.5"/>
  <text x="224" y="806" font-size="11" fill="#1F1F1F" text-anchor="middle">Feedback</text>

  <!-- Agent 1 output -->
  <rect x="74" y="900" width="192" height="44" rx="8" fill="#F8F5F0" stroke="#2C3E4A" stroke-width="2"/>
  <text x="170" y="927" font-size="12" fill="#2C3E4A" font-weight="700" text-anchor="middle">Agent 1</text>

  <!-- Loop arrow: Agent 1 → Orchestrator -->
  <path d="M 170 900 L 170 872 L 74 872 L 74 772" stroke="#7A9E8E" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arr)"/>

  <!-- Arrow: Orchestrator → MCP -->
  <line x1="310" y1="768" x2="354" y2="768" stroke="#7A9E8E" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── MCP ZONE ── -->
  <rect x="328" y="600" width="234" height="558" rx="10" fill="#1E3828" stroke="#3A5848" stroke-width="1"/>
  <text x="445" y="626" font-size="11" fill="#7A9E8E" font-weight="700" text-anchor="middle">Model Context</text>
  <text x="445" y="643" font-size="11" fill="#7A9E8E" font-weight="700" text-anchor="middle">Protocol (MCP)</text>

  <!-- MCP boxes -->
  <rect x="344" y="658" width="202" height="56" rx="8" fill="#F8F5F0" stroke="#7A9E8E" stroke-width="1.5"/>
  <text x="445" y="682" font-size="10" fill="#1F1F1F" text-anchor="middle">Discover Agent</text>
  <text x="445" y="697" font-size="10" fill="#1F1F1F" text-anchor="middle">Capabilities</text>

  <rect x="344" y="726" width="202" height="44" rx="8" fill="#F8F5F0" stroke="#7A9E8E" stroke-width="1.5"/>
  <text x="445" y="753" font-size="10" fill="#1F1F1F" text-anchor="middle">Share tasks</text>

  <rect x="344" y="782" width="202" height="56" rx="8" fill="#F8F5F0" stroke="#7A9E8E" stroke-width="1.5"/>
  <text x="445" y="806" font-size="10" fill="#1F1F1F" text-anchor="middle">Update Task</text>
  <text x="445" y="821" font-size="10" fill="#1F1F1F" text-anchor="middle">Information</text>

  <!-- ── AGENTS ZONE ── -->
  <rect x="582" y="600" width="285" height="558" rx="10" fill="#1E3828" stroke="#3A5848" stroke-width="1"/>

  <!-- Coding Agent -->
  <rect x="596" y="618" width="257" height="118" rx="9" fill="#1A3025" stroke="#7EC8A0" stroke-width="2"/>
  <text x="724" y="684" font-size="13" fill="#FAFAF7" font-weight="700" text-anchor="middle">Coding Agent</text>
  <!-- Arrow MCP → Coding -->
  <line x1="546" y1="686" x2="582" y2="686" stroke="#7EC8A0" stroke-width="2" marker-end="url(#arr-cod)"/>
  <!-- Feedback arrow back -->
  <line x1="582" y1="706" x2="546" y2="706" stroke="#7EC8A0" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Retrieval Agent -->
  <rect x="596" y="754" width="257" height="118" rx="9" fill="#1A2C38" stroke="#70B0D0" stroke-width="2"/>
  <text x="724" y="820" font-size="13" fill="#FAFAF7" font-weight="700" text-anchor="middle">Retrieval Agent</text>
  <!-- Arrow MCP → Retrieval -->
  <line x1="546" y1="748" x2="582" y2="820" stroke="#70B0D0" stroke-width="2" marker-end="url(#arr-ret)"/>
  <line x1="582" y1="840" x2="546" y2="780" stroke="#70B0D0" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Citation Agent -->
  <rect x="596" y="890" width="257" height="118" rx="9" fill="#251A38" stroke="#B090D8" stroke-width="2"/>
  <text x="724" y="956" font-size="13" fill="#FAFAF7" font-weight="700" text-anchor="middle">Citation Agent</text>
  <!-- Arrow MCP → Citation -->
  <line x1="546" y1="810" x2="596" y2="956" stroke="#B090D8" stroke-width="2" marker-end="url(#arr-cit)"/>
  <line x1="596" y1="976" x2="546" y2="826" stroke="#B090D8" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- ── FOOTER NOTE ── -->
  <text x="450" y="1190" font-size="10" fill="#5A7A6A" text-anchor="middle" font-style="italic">agentilis.ai — Characterized by action.</text>
</svg>
